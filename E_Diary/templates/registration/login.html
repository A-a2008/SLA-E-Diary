{% extends 'base.html' %}
{% load static %}

{% block content %}
<div id="main">
    <div class="inner">
        <h1>Sign In</h1>
        {% if error %}
        <p style="color: #c62828; background: #fce4e4; padding: 0.75rem; border-radius: 4px;">{{ error }}</p>
        {% endif %}
        <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" style="max-width: 400px;">
            {% csrf_token %}
            <div class="field">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" required>
            </div>
            <br>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            <br>
            <ul class="actions">
                <li><input type="submit" value="Sign In" class="primary"></li>
            </ul>
        </form>
    </div>
</div>
{% endblock %}
